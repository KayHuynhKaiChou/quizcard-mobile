<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Welcome to Terminology Master</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#137fec",
            "background-light": "#f6f7f8",
            "background-dark": "#101922",
          },
          fontFamily: {
            "display": ["Lexend", "sans-serif"]
          },
          borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
        },
      },
    }
  </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased min-h-screen flex justify-center">
<!-- Mobile Container -->
<div class="relative flex min-h-screen w-full max-w-md flex-col overflow-hidden bg-background-light dark:bg-background-dark mx-auto shadow-2xl">
<!-- Top Section with Soft Blue Background and Rounded Bottom -->
<div class="relative flex flex-col items-center w-full bg-blue-50 dark:bg-slate-800 rounded-b-[48px] pb-8 pt-4 px-4 flex-shrink-0">
<!-- Skip Button -->
<div class="w-full flex justify-end">
<button class="text-primary hover:text-primary/80 text-base font-bold leading-normal tracking-wide px-4 py-2 transition-colors">
          Skip
        </button>
</div>
<!-- Illustration Area -->
<div class="w-full max-w-[280px] aspect-square mt-4 mb-4 flex items-center justify-center relative">
<!-- Abstract representation of the illustration since we can't load real images reliably -->
<div class="absolute inset-0 bg-primary/10 rounded-full blur-2xl"></div>
<div class="w-full h-full bg-center bg-no-repeat bg-contain z-10" data-alt="Person holding a dictionary illustration" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCmGG0RnYo9QUba2cGFgs9uNheB8rWa12Kh-iQxVZlOOsZTA4ovCMa6BbgnxoBIuR_-vCG28Ns9hQqftMTC5m37ZC4b8RYVKEeUuW2tMlynH5LvKVqz5k9SonalWuvG-ryoaDDlvFft_NDM8vD_ZvFrMBDR0GzXvwMrzItGEnE2JoK96noyPWNU4TrIkjfwmz9HzCU39SLRsiuQywuT2bTNVUOiRN8wMPwVCJhEkUWurzTl_EhVtDeE_vWvu52GWzCO7IKCp06U0BvI');">
</div>
</div>
</div>
<!-- Content Section -->
<div class="flex flex-col flex-1 px-6 pt-10 pb-8 justify-between">
<div class="flex flex-col items-center">
<!-- Title -->
<h1 class="text-3xl font-bold leading-tight text-center mb-4 text-slate-900 dark:text-slate-100">
          Welcome to <br/> Terminology Master!
        </h1>
<!-- Subtext -->
<p class="text-base font-normal leading-relaxed text-center text-slate-600 dark:text-slate-400 max-w-[300px]">
          Learn and master complex academic terms effortlessly with our smart flashcard system.
        </p>
</div>
<!-- Bottom Controls -->
<div class="flex flex-col items-center w-full mt-10 gap-8">
<!-- Indicators (Variant 1 of 3) -->
<div class="flex flex-row items-center justify-center gap-2">
<div class="h-2.5 w-8 rounded-full bg-primary transition-all duration-300"></div>
<div class="h-2.5 w-2.5 rounded-full bg-primary/20 dark:bg-primary/30 transition-all duration-300"></div>
<div class="h-2.5 w-2.5 rounded-full bg-primary/20 dark:bg-primary/30 transition-all duration-300"></div>
</div>
<!-- Next Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold text-lg py-4 px-8 rounded-xl shadow-lg shadow-primary/30 transition-all active:scale-95 flex items-center justify-center gap-2">
          Next
          <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</div>
</div>
</div>
</body></html>
