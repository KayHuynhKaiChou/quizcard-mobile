<link href="https://fonts.googleapis.com" rel="preconnect"/>

<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed px-4 max-w-sm">
          See your daily progress, earn achievement badges, and keep your learning streak alive.
        </p>
</div>
</div>

<div class="w-full flex flex-col items-center gap-8 px-6 pb-8">

<div class="flex flex-row items-center justify-center gap-2">
<div class="h-2 w-2 rounded-full bg-slate-300 dark:bg-slate-700 transition-colors"></div>
<div class="h-2 w-2 rounded-full bg-slate-300 dark:bg-slate-700 transition-colors"></div>
<div class="h-2 w-8 rounded-full bg-primary transition-all duration-300"></div>
</div>

<button class="w-full flex items-center justify-center bg-primary hover:bg-primary/90 text-white text-lg font-semibold py-4 px-6 rounded-full transition-all active:scale-[0.98] shadow-lg shadow-primary/20">
