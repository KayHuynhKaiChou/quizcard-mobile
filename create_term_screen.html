<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create or Edit Terminology</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto bg-white dark:bg-[#15212c]">
<!-- Top App Bar -->
<div class="flex items-center p-4 pb-2 justify-between sticky top-0 bg-white dark:bg-[#15212c] z-10 border-b border-slate-200 dark:border-slate-800">
<button class="flex size-12 shrink-0 items-center text-slate-700 dark:text-slate-300 hover:text-primary dark:hover:text-primary transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back_ios_new</span>
</button>
<h2 class="text-lg font-bold leading-tight flex-1 text-center pr-12">Edit Term</h2>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto pb-24">
<!-- Term Name Input -->
<div class="flex flex-col gap-2 px-4 py-4">
<label class="flex flex-col w-full">
<span class="text-sm font-medium leading-normal pb-1.5 text-slate-700 dark:text-slate-300">Term Name</span>
<input class="form-input flex w-full rounded-xl focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-background-dark h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-4 text-base font-normal transition-colors" placeholder="Enter term name" type="text" value="Photosynthesis"/>
</label>
</div>
<!-- Definition Input -->
<div class="flex flex-col gap-2 px-4 py-3">
<label class="flex flex-col w-full">
<span class="text-sm font-medium leading-normal pb-1.5 text-slate-700 dark:text-slate-300">Definition</span>
<textarea class="form-input flex w-full resize-none rounded-xl focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-background-dark min-h-[120px] placeholder:text-slate-400 dark:placeholder:text-slate-500 p-4 text-base font-normal transition-colors" placeholder="Enter definition">The process by which green plants and some other organisms use sunlight to synthesize foods from carbon dioxide and water.</textarea>
</label>
</div>
<!-- Example Sentence Input -->
<div class="flex flex-col gap-2 px-4 py-3">
<label class="flex flex-col w-full">
<span class="text-sm font-medium leading-normal pb-1.5 text-slate-700 dark:text-slate-300">Example Sentence <span class="text-xs text-slate-500 dark:text-slate-400 font-normal ml-1">(Optional)</span></span>
<textarea class="form-input flex w-full resize-none rounded-xl focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-background-dark min-h-[100px] placeholder:text-slate-400 dark:placeholder:text-slate-500 p-4 text-base font-normal transition-colors" placeholder="Enter example sentence">Through photosynthesis, the plant produces oxygen as a byproduct.</textarea>
</label>
</div>
<!-- Upload Image Button -->
<div class="px-4 py-3 mt-2">
<button class="w-full flex items-center justify-between p-4 rounded-xl border border-dashed border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-background-dark hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors group">
<div class="flex items-center gap-4">
<div class="flex items-center justify-center rounded-lg bg-primary/10 dark:bg-primary/20 text-primary shrink-0 size-10">
<span class="material-symbols-outlined">image</span>
</div>
<div class="flex flex-col items-start">
<span class="text-base font-medium leading-normal text-slate-700 dark:text-slate-200">Upload Image</span>
<span class="text-xs text-slate-500 dark:text-slate-400">PNG, JPG up to 5MB</span>
</div>
</div>
<span class="material-symbols-outlined text-slate-400 dark:text-slate-500 group-hover:text-primary dark:group-hover:text-primary transition-colors">chevron_right</span>
</button>
</div>
<!-- Delete Button -->
<div class="px-4 mt-8 mb-4">
<button class="w-full py-4 text-red-500 dark:text-red-400 text-sm font-medium flex items-center justify-center gap-2 rounded-xl hover:bg-red-50 dark:hover:bg-red-500/10 transition-colors">
<span class="material-symbols-outlined text-xl">delete</span>
                    Delete Term
                </button>
</div>
</div>
<!-- Fixed Bottom Action -->
<div class="fixed bottom-0 w-full max-w-md bg-white dark:bg-[#15212c] p-4 border-t border-slate-200 dark:border-slate-800">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-4 px-6 rounded-xl shadow-lg shadow-primary/30 transition-all flex items-center justify-center gap-2 text-base">
<span class="material-symbols-outlined">save</span>
                Save Term
            </button>
</div>
</div>
</body></html>
