<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Flashcard Study Mode</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen">
<div class="relative flex h-full min-h-screen w-full flex-col max-w-md mx-auto bg-background-light dark:bg-background-dark shadow-xl overflow-x-hidden">
<!-- App Bar -->
<div class="flex items-center p-4 pb-2 justify-between">
<button class="flex size-12 shrink-0 items-center justify-center text-slate-800 dark:text-slate-200 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Study Mode</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex size-12 cursor-pointer items-center justify-center overflow-hidden rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 text-slate-800 dark:text-slate-200 transition-colors">
<span class="material-symbols-outlined text-2xl">more_horiz</span>
</button>
</div>
</div>
<!-- Progress Indicator -->
<div class="flex flex-col gap-2 p-4 pt-2">
<div class="flex gap-4 justify-between items-center">
<p class="text-slate-600 dark:text-slate-400 text-sm font-medium leading-normal">Card 5 of 20</p>
<p class="text-slate-900 dark:text-slate-100 text-sm font-bold leading-normal">25%</p>
</div>
<div class="rounded-full bg-slate-200 dark:bg-slate-800 h-2 w-full overflow-hidden">
<div class="h-2 rounded-full bg-primary" style="width: 25%;"></div>
</div>
</div>
<!-- Flashcard Area -->
<div class="flex-1 flex flex-col items-center justify-center p-6 w-full">
<div class="relative w-full aspect-[3/4] max-h-[60vh] rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] dark:shadow-[0_8px_30px_rgb(0,0,0,0.3)] flex flex-col items-center justify-center p-8 cursor-pointer group hover:shadow-[0_8px_30px_rgb(19,127,236,0.15)] transition-shadow duration-300" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
<!-- Card Front Content -->
<div class="flex flex-col items-center justify-center text-center w-full h-full">
<span class="material-symbols-outlined text-4xl mb-6 absolute top-8 text-white/80">school</span>
<h1 class="tracking-tight text-3xl sm:text-4xl font-bold leading-tight w-full break-words text-white">
                        Photosynthesis
                    </h1>
<div class="absolute bottom-8 flex items-center gap-2 transition-colors text-white/70">
<span class="material-symbols-outlined text-sm">touch_app</span>
<p class="text-sm font-medium">Tap to flip</p>
</div>
</div>
<!-- Abstract decorative background element for the card -->
</div>
</div>
<!-- Action Buttons -->
<div class="p-6 pb-10 mt-auto">
<div class="flex w-full gap-4 justify-between">
<button class="flex-1 cursor-pointer items-center justify-center rounded-xl h-14 px-4 bg-red-100 hover:bg-red-200 dark:bg-red-500/10 dark:hover:bg-red-500/20 text-red-700 dark:text-red-400 text-base font-bold transition-colors border border-red-200 dark:border-red-500/20 flex gap-2 shadow-sm">
<span class="material-symbols-outlined text-xl">close</span>
<span class="truncate">Still Learning</span>
</button>
<button class="flex-1 cursor-pointer items-center justify-center rounded-xl h-14 px-4 bg-green-500 hover:bg-green-600 dark:bg-green-500 dark:hover:bg-green-600 text-white text-base font-bold transition-colors shadow-md shadow-green-500/20 flex gap-2">
<span class="material-symbols-outlined text-xl">check</span>
<span class="truncate">Know it</span>
</button>
</div>
</div>
</div>
</body></html>
