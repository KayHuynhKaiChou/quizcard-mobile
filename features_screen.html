<link href="https://fonts.googleapis.com" rel="preconnect"/>

<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>

<script id="tailwind-config">

<div class="@container flex-1 flex flex-col justify-center">
<div class="px-4 py-3">
<div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden rounded-xl min-h-[320px] shadow-lg relative" data-alt="Quiz cards and a glowing leaderboard graphic on a digital tablet screen" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAMeScS1PHkhn8YVcEBZOhC6OFImOBSPrV9cvHYfggUwSrQlyHGlkOW46A0X8plgIZhCaYojx6kqWoKolgwLOz-VmW5gI_Nwo-MC1xBbD3_GAEQebqrBeVeH3NnXifMhdRVDD_EF7QiR7XEmUQ0q-TPcfCCsbRbKWmFmMAU1X_czozVD2Xa8RmnPJpenrq0IpTb9DIqX9ow6L_2_gTqPLXZjNkjfhcjxwbjNGiteUKpBVril9s3LH6ddYCzYX4c-bH2hgDanQ3jCb9d');">
<div class="absolute inset-0 bg-gradient-to-t from-background-dark/80 to-transparent"></div>
</div>
</div>
</div>

<div class="flex flex-col items-center px-6 pb-8">
<h1 class="text-slate-900 dark:text-white tracking-tight text-[32px] font-bold leading-tight text-center pb-3 pt-6">
        Challenge Yourself
      </h1>
<p class="text-slate-600 dark:text-slate-300 text-base font-normal leading-relaxed pb-8 pt-1 text-center">
        Test your knowledge with interactive quizzes and climb the global leaderboard to compete with others.
      </p>
<!-- Progress Dots -->
<div class="flex w-full flex-row items-center justify-center gap-3 py-5">
<div class="h-2 w-2 rounded-full bg-slate-300 dark:bg-slate-700"></div>
<div class="h-2 w-6 rounded-full bg-primary"></div>
<div class="h-2 w-2 rounded-full bg-slate-300 dark:bg-slate-700"></div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-4 px-6 rounded-xl transition-colors shadow-md mt-4">
